<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Admin Beta — Hadrion</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.login-box { background: #1e293b; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
.logo { text-align: center; font-size: 48px; margin-bottom: 12px; }
h1 { text-align: center; font-size: 20px; font-weight: 900; color: #ffd166; margin-bottom: 4px; }
.sub { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 28px; }
input, select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #e2e8f0; font-family: inherit; font-size: 14px; font-weight: 700; outline: none; margin-bottom: 10px; }
input:focus, select:focus { border-color: #3a86ff; }
.btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: inherit; font-weight: 900; font-size: 14px; cursor: pointer; transition: all .15s; }
.btn-primary { background: linear-gradient(135deg, #3a86ff, #7c3aed); color: white; box-shadow: 0 4px 16px rgba(58,134,255,.35); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(58,134,255,.5); }
.btn-primary:active { transform: scale(.96); }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
.btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; width: auto; }
#main-screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 12px; padding: 16px 0 20px; border-bottom: 2px solid #1e293b; margin-bottom: 20px; }
.section { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.code-card { background: #0f172a; border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; border: 2px solid #334155; }
.code-badge { font-size: 24px; font-weight: 900; color: #ffd166; font-family: monospace; min-width: 120px; }
.code-info { flex: 1; }
.code-name { font-size: 13px; font-weight: 800; color: #e2e8f0; }
.code-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
.status-ok { color: #22c55e; }
.status-exp { color: #ef4444; }
.survey-card { background: #0f172a; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 2px solid #334155; }
.survey-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.survey-score { font-size: 20px; font-weight: 900; color: #ffd166; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
.tag-cap { background: #1e3a5f; color: #60a5fa; }
.tag-pro { background: #1a2d1e; color: #86efac; }
.empty { text-align: center; color: #475569; padding: 24px; font-size: 13px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 13px; z-index: 9999; display: none; }
label { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 4px; display: block; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #334155; background: transparent; color: #64748b; font-family: inherit; font-weight: 800; font-size: 12px; cursor: pointer; }
.tab.active { border-color: #3a86ff; background: #1e3a5f; color: #93c5fd; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🔐</div>
    <h1>Panel Admin Beta</h1>
    <p class="sub">Hadrion · Acceso exclusivo</p>
    <label>Contraseña de administrador</label>
    <input type="password" id="admin-pass" placeholder="Ingresá la contraseña" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn btn-primary" onclick="adminLogin()">INGRESAR</button>
    <p id="login-error" style="color:#ef4444;font-size:12px;text-align:center;margin-top:8px;display:none">Contraseña incorrecta</p>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="header">
    <div style="font-size:32px">📊</div>
    <div>
      <div style="font-size:18px;font-weight:900;color:#ffd166">Admin Beta — Hadrion</div>
      <div style="font-size:11px;color:#64748b">Panel de control de usuarios beta</div>
    </div>
    <button class="btn btn-sm" onclick="logout()" style="margin-left:auto;background:#334155;color:#94a3b8;border:none;cursor:pointer;border-radius:8px;padding:6px 12px;font-family:inherit;font-weight:700">Salir</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('codes',this)">🔑 Códigos Beta</button>
    <button class="tab" onclick="switchTab('surveys',this)">📋 Cuestionarios</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Estadísticas</button>
  </div>

  <!-- TAB: CODES -->
  <div id="tab-codes">
    <div class="section">
      <div class="section-title">➕ Generar nuevo código beta</div>
      <div class="form-row">
        <div>
          <label>Nombre del usuario</label>
          <input type="text" id="new-name" placeholder="Ej: María García">
        </div>
        <div>
          <label>App</label>
          <select id="new-app">
            <option value="ComuniCAP">ComuniCAP</option>
            <option value="ComuniPro">ComuniPro</option>
            <option value="Ambas">Ambas apps</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Email (para resultados)</label>
          <input type="email" id="new-email" placeholder="email@ejemplo.com">
        </div>
        <div>
          <label>Días de prueba</label>
          <select id="new-days">
            <option value="20">20 días</option>
            <option value="14">14 días</option>
            <option value="30">30 días</option>
            <option value="7">7 días</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="generateCode()" style="margin-top:4px">🎲 GENERAR CÓDIGO</button>
    </div>

    <div class="section">
      <div class="section-title">🔑 Códigos activos</div>
      <div id="codes-list"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <!-- TAB: SURVEYS -->
  <div id="tab-surveys" style="display:none">
    <div class="section">
      <div class="section-title">📋 Cuestionarios recibidos</div>
      <div id="surveys-list"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <!-- TAB: STATS -->
  <div id="tab-stats" style="display:none">
    <div class="section">
      <div class="section-title">📊 Resumen general</div>
      <div id="stats-content"><div class="empty">Cargando...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = "https://lgpqyjevdwstbnerawmp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxncHF5amV2ZHdzdGJuZXJhd21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzM1OTgsImV4cCI6MjA5MjgwOTU5OH0.GMPbwHdxj_aRLaJgDHCkDA5L1KHAwLJLkO9LYOpI8pA";
const ADMIN_PASSWORD = "Hadrion2026!";

function adminLogin() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

function switchTab(tab, btn) {
  ['codes','surveys','stats'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toast(msg, color='#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function generateCode() {
  const name = document.getElementById('new-name').value.trim();
  const app  = document.getElementById('new-app').value;
  const email= document.getElementById('new-email').value.trim();
  const days = parseInt(document.getElementById('new-days').value);
  if (!name) { toast('Ingresá el nombre del usuario', '#ef4444'); return; }

  // Generate unique code: BETA-XXXX-XXXX
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const rand = n => Array.from({length:n}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  const code = `BETA-${rand(4)}-${rand(4)}`;
  const expiry = new Date(Date.now() + days * 86400000).toISOString().split('T')[0];

  fetch(SB_URL + '/rest/v1/beta_codes', {
    method: 'POST',
    headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ code, user_name: name, user_email: email||null, app, days, expiry_date: expiry, active: true, created_at: new Date().toISOString() })
  }).then(r => r.json()).then(data => {
    toast(`✅ Código generado: ${code}`);
    document.getElementById('new-name').value = '';
    document.getElementById('new-email').value = '';
    // Copy to clipboard
    navigator.clipboard?.writeText(code);
    loadCodes();
    // Show share modal
    showCodeCard(code, name, app, expiry, days);
  }).catch(() => {
    // Save locally if offline
    const local = JSON.parse(localStorage.getItem('beta_codes_local') || '[]');
    local.push({ code, user_name: name, app, days, expiry_date: expiry });
    localStorage.setItem('beta_codes_local', JSON.stringify(local));
    toast(`✅ ${code} (guardado local)`);
    navigator.clipboard?.writeText(code);
    showCodeCard(code, name, app, expiry, days);
    loadCodes();
  });
}

function showCodeCard(code, name, app, expiry, days) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#1e293b;border-radius:20px;padding:28px;max-width:340px;width:100%;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">🎉</div>
      <div style="font-size:14px;font-weight:700;color:#94a3b8;margin-bottom:6px">Código beta generado para</div>
      <div style="font-size:18px;font-weight:900;color:white;margin-bottom:16px">${name}</div>
      <div style="background:#0f172a;border-radius:14px;padding:16px;margin-bottom:16px">
        <div style="font-size:28px;font-weight:900;color:#ffd166;letter-spacing:2px;font-family:monospace">${code}</div>
        <div style="font-size:11px;color:#64748b;margin-top:6px">${app} · ${days} días · Vence ${expiry}</div>
      </div>
      <div style="font-size:12px;color:#22c55e;margin-bottom:16px">📋 Copiado al portapapeles</div>
      <div style="display:flex;gap:8px">
        <button onclick="shareCode('${code}','${name}','${app}','${expiry}')" style="flex:1;padding:10px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;border:none;border-radius:10px;font-family:inherit;font-weight:900;font-size:12px;cursor:pointer">💬 WhatsApp</button>
        <button onclick="this.closest('[style*=fixed]').remove()" style="flex:1;padding:10px;background:#334155;color:#94a3b8;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer">Cerrar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function shareCode(code, name, app, expiry) {
  const appLinks = {
    "ComuniCAP": "https://comunipro2026-oss.github.io/comunica-aac/",
    "ComuniPro": "https://comunipro2026-oss.github.io/comunicador-aac/",
    "PictoCrisis": "https://comunipro2026-oss.github.io/pictoccrisis-policia/"
  };
  const link = appLinks[app] || "";
  const linkLine = link ? `\n\n🔗 Ingresá acá con tu código: ${link}?beta=${code}` : "";
  const msg = `🎉 Hola ${name}!\n\nTu código de acceso beta para *${app}* de Hadrion es:\n\n*${code}*\n\nVálido hasta el ${expiry}.${linkLine}\n\nCualquier consulta escribime 💬\n\n_Adriana Soba — Fonoaudióloga · Hadrion_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

async function loadData() {
  await loadCodes();
  await loadSurveys();
}

async function loadCodes() {
  const list = document.getElementById('codes-list');
  if (!list) return;
  
  try {
    const res = await fetch(SB_URL + '/rest/v1/beta_codes?order=created_at.desc&limit=50', {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    const codes = await res.json();
    
    if (!codes.length) { list.innerHTML = '<div class="empty">Sin códigos generados aún</div>'; return; }
    
    const today = new Date().toISOString().split('T')[0];
    list.innerHTML = codes.map(c => {
      const expired = c.expiry_date < today;
      const daysLeft = Math.ceil((new Date(c.expiry_date) - new Date()) / 86400000);
      return `<div class="code-card">
        <div>
          <div class="code-badge">${c.code}</div>
          <div style="font-size:10px;color:#64748b;margin-top:2px">${c.app}</div>
        </div>
        <div class="code-info">
          <div class="code-name">${c.user_name}</div>
          <div class="code-meta">${c.user_email || 'Sin email'}</div>
          <div class="code-meta" style="color:${expired?'#ef4444':'#22c55e'}">
            ${expired ? '⏰ Vencido' : `✅ ${daysLeft}d restantes`} · Vence ${c.expiry_date}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button onclick="shareCode('${c.code}','${c.user_name}','${c.app}','${c.expiry_date}')" class="btn btn-sm btn-green">💬</button>
          <button onclick="revokeCode('${c.code}')" class="btn btn-sm btn-danger">🗑</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    // Load from local storage
    const local = JSON.parse(localStorage.getItem('beta_codes_local') || '[]');
    if (!local.length) { list.innerHTML = '<div class="empty">Sin conexión — sin códigos locales</div>'; return; }
    list.innerHTML = local.map(c => `<div class="code-card">
      <div class="code-badge">${c.code}</div>
      <div class="code-info"><div class="code-name">${c.user_name}</div><div class="code-meta">${c.app} · ${c.days}d</div></div>
    </div>`).join('');
  }
}

async function revokeCode(code) {
  if (!confirm(`¿Revocar el código ${code}?`)) return;
  await fetch(SB_URL + `/rest/v1/beta_codes?code=eq.${code}`, {
    method: 'PATCH',
    headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ active: false })
  });
  toast('Código revocado');
  loadCodes();
}

async function loadSurveys() {
  const list = document.getElementById('surveys-list');
  const stats = document.getElementById('stats-content');
  if (!list) return;
  
  try {
    const res = await fetch(SB_URL + '/rest/v1/beta_surveys?order=submitted_at.desc&limit=100', {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    const surveys = await res.json();
    
    if (!surveys.length) {
      list.innerHTML = '<div class="empty">Aún no hay cuestionarios enviados</div>';
      stats.innerHTML = '<div class="empty">Sin datos aún</div>';
      return;
    }
    
    list.innerHTML = surveys.map(s => {
      const date = new Date(s.submitted_at).toLocaleDateString('es-UY');
      return `<div class="survey-card">
        <div class="survey-header">
          <div>
            <div style="font-size:13px;font-weight:800;color:white">${s.user_name || 'Usuario anónimo'}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px">${date} · ${s.user_code || ''}</div>
            <span class="tag ${s.app==='ComuniCAP'?'tag-cap':'tag-pro'}" style="margin-top:4px">${s.app}</span>
          </div>
          <div style="text-align:right">
            <div class="survey-score">${s.avg_score ? s.avg_score + ' ⭐' : '-'}</div>
            <button onclick="showSurveyDetail(${JSON.stringify(s).replace(/"/g,'&quot;')})" style="font-size:11px;color:#3a86ff;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px">Ver respuestas →</button>
          </div>
        </div>
      </div>`;
    }).join('');
    
    // Stats
    const avg = (surveys.reduce((a,s) => a + (s.avg_score||0), 0) / surveys.filter(s=>s.avg_score).length).toFixed(1);
    const capCount = surveys.filter(s=>s.app==='ComuniCAP').length;
    const proCount = surveys.filter(s=>s.app==='ComuniPro').length;
    stats.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:#0f172a;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:28px;font-weight:900;color:#ffd166">${surveys.length}</div>
          <div style="font-size:11px;color:#64748b">Cuestionarios</div>
        </div>
        <div style="background:#0f172a;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:28px;font-weight:900;color:#22c55e">${avg} ⭐</div>
          <div style="font-size:11px;color:#64748b">Puntaje promedio</div>
        </div>
        <div style="background:#0f172a;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#60a5fa">${capCount}</div>
          <div style="font-size:11px;color:#64748b">ComuniCAP</div>
        </div>
        <div style="background:#0f172a;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#86efac">${proCount}</div>
          <div style="font-size:11px;color:#64748b">ComuniPro</div>
        </div>
      </div>
      <button onclick="exportCSV(${JSON.stringify(surveys).replace(/"/g,'&quot;')})" class="btn btn-primary">📥 Exportar CSV</button>
    `;
  } catch(e) {
    list.innerHTML = '<div class="empty">Error al cargar. Verificá conexión.</div>';
  }
}

function showSurveyDetail(survey) {
  const questions = [
    'Facilidad de uso','Claridad pictogramas','Tamaño botones','Uso sin ayuda','Funciona offline',
    'Pictogramas representativos','Claridad de voz','Usó emergencia','Armó frases','Pictogramas por frase',
    'Usó favoritos','Usó búsqueda','Usó historial','Usó actividades','Utilidad panel dolor',
    'Función más usada','Diseño visual','Colores ayudan','Tamaño adecuado',
    'Mejora comunicación','Lo recomendaría','Perfil del usuario',
    'Lo que más gustó','Qué cambiaría','Problemas técnicos'
  ];
  const ans = survey.answers || {};
  let html = `<div style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;overflow-y:auto;padding:16px">
    <div style="background:#1e293b;border-radius:16px;padding:20px;max-width:500px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><div style="font-weight:900;color:white">${survey.user_name}</div><div style="font-size:11px;color:#64748b">${survey.app} · ${survey.avg_score}⭐</div></div>
        <button onclick="this.closest('[style*=fixed]').remove()" style="background:#334155;color:#94a3b8;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit">✕</button>
      </div>`;
  Object.entries(ans).forEach(([key, val], i) => {
    const qNum = parseInt(key.replace('q','')) - 1;
    const qText = questions[qNum] || key;
    const isGood = typeof val === 'number' ? val >= 4 : val === 'Sí';
    html += `<div style="padding:8px 0;border-bottom:1px solid #334155">
      <div style="font-size:11px;color:#64748b">${qText}</div>
      <div style="font-size:13px;font-weight:700;color:${typeof val==='number'?'#ffd166':val==='Sí'?'#86efac':val==='No'?'#fca5a5':'#e2e8f0'}">${typeof val==='number'?'⭐'.repeat(val)+` (${val}/5)`:val}</div>
    </div>`;
  });
  html += `</div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function exportCSV(surveys) {
  const questions = ['q1','q2','q3','q4','q5','q6','q7','q8','q9','q10','q11','q12','q13','q14','q15','q16','q17','q18','q19','q20','q21','q22','q23','q24','q25'];
  const headers = ['Nombre','App','Código','Fecha','Puntaje',...questions];
  const rows = surveys.map(s => [
    s.user_name, s.app, s.user_code, s.submitted_at?.split('T')[0], s.avg_score,
    ...questions.map(q => (s.answers||{})[q] || '')
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `evaluaciones_beta_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('📥 CSV descargado');
}
</script>
</body>
</html>
